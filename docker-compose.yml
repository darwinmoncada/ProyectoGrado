name: proyectogrado

services:
  postgres:
    image: postgres:16-alpine
    container_name: inventario_db
    environment:
      POSTGRES_DB: inventario_uts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Fuerza UTF-8 explícitamente en la creación del cluster (defensa en profundidad;
      # evita que un volumen nuevo termine con una codificación distinta a la esperada).
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Precarga de datos: Postgres ejecuta automáticamente cualquier script en
      # docker-entrypoint-initdb.d/ la PRIMERA vez que arranca con un volumen
      # vacío (nunca en arranques posteriores, aunque el archivo cambie). Así,
      # el comité de grado obtiene el sistema con las 11 tablas y datos reales
      # ya cargados desde el primer "iniciar_sistema.bat", sin depender de
      # internet ni de Neon. init.sql se generó con pg_dump -f dentro del
      # propio contenedor (nunca por redirección de shell) — ver
      # INSTRUCCIONES_DESPLIEGUE.md sección 4 para el porqué de esa distinción.
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventario_net

  backend:
    build:
      # backend/Dockerfile copia archivos de "frontend/" y "backend/", así que el contexto
      # debe ser la raíz del repo (no ./backend), o el build falla al no encontrar esas rutas.
      context: .
      dockerfile: backend/Dockerfile
    container_name: inventario_backend
    ports:
      - "8080:8080"
    environment:
      # Base de datos 100% local: apunta al servicio "postgres" de este mismo compose,
      # ya NO depende de Neon ni de env.txt.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventario_uts
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      FRONTEND_URL: http://localhost
      # IP LAN real de la máquina host, detectada por iniciar_sistema.bat antes de
      # levantar los contenedores (dentro del contenedor solo se vería la IP interna de Docker).
      HOST_LAN_IP: ${HOST_LAN_IP:-127.0.0.1}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - inventario_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventario_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - inventario_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  inventario_net:
    driver: bridge
