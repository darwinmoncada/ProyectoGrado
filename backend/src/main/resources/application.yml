spring:
  application:
    name: inventario-activos-uts

  datasource:
    url: jdbc:postgresql://localhost:5432/inventario_uts
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1245}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Bogota

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000       # 24 horas en ms
    refresh-expiration: 604800000  # 7 días en ms

  cors:
    allowed-origins: "http://localhost:5173,http://localhost:3000"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  info:
    title: API Sistema de Inventario UTS
    description: API REST para el Sistema de Inventario y Control de Activos Tecnológicos
    version: 1.0.0
    contact:
      name: UTS - Unidades Tecnológicas de Santander

logging:
  level:
    com.uts.inventario: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
