<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error - Inventario UTS</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.35);
    }
    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.04em;
    }
    p {
      color: #cbd5e1;
      line-height: 1.75;
      margin: 0 0 1.75rem;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 1.8rem;
      border-radius: 999px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s ease;
    }
    a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Algo falló</h1>
    <p>La página no se pudo cargar correctamente. Intenta recargarla o vuelve al inicio.</p>
    <a href="/">Volver al inicio</a>
  </div>
</body>
</html>
